# Single-host deploy that preserves the local SQLite-store architecture.
#
# - `app`        — the Next.js control plane on :3000
# - `reconcile`  — sidecar that runs `npm run worker:reconcile` every 60s
# - `research`   — sidecar that runs `npm run worker:research` every 5 min
#
# Both sidecars share the same data volume so the database stays consistent.
#
# Bring up:   docker compose up -d --build
# Logs:       docker compose logs -f app
# Stop:       docker compose down
#
# Secrets: drop your .env.local at the project root before `up`. The compose
# file mounts it read-only into every container so secrets never bake into
# the image.

services:
  # Canonical market-data warehouse — single source of truth for the heavy
  # append-only time-series (coinbase_candles, realtime_ticks, L2 captures,
  # market_snapshots) as TimescaleDB hypertables. Both the dev checkout and the
  # live arena loop connect over localhost:5432, ending the SQLite file
  # divergence (HFT-work/data vs hft-live/data). The small transactional arena
  # control-plane (paper_agents/capsules/generations) stays on SQLite for now.
  #   Connect:  TSDB_URL=postgres://hft:${TSDB_PASSWORD:-hft_local_dev}@localhost:5544/hft
  #   Init:     npm run tsdb:init       Migrate from SQLite: npm run tsdb:migrate
  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: hft-timescaledb
    # 5544 on the host (a local Postgres already owns 5432) → 5432 in the container.
    ports:
      - "5544:5432"
    environment:
      - POSTGRES_USER=hft
      - POSTGRES_PASSWORD=${TSDB_PASSWORD:-hft_local_dev}
      - POSTGRES_DB=hft
    # The warehouse accumulates many hypertable chunks; whole-table scans (listProducts,
    # getCandles without a time bound) lock every chunk, so raise the lock budget.
    command: ["postgres", "-c", "max_locks_per_transaction=2048", "-c", "shared_buffers=256MB"]
    volumes:
      - hft-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hft -d hft"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: polymarket-agents:latest
    container_name: polymarket-agents-app
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - polymarket-data:/app/data
      - ./coinbase_cloud_api_key.json:/app/coinbase_cloud_api_key.json:ro
    restart: unless-stopped

  reconcile:
    image: polymarket-agents:latest
    container_name: polymarket-agents-reconcile
    depends_on:
      - app
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    volumes:
      - polymarket-data:/app/data
      - ./coinbase_cloud_api_key.json:/app/coinbase_cloud_api_key.json:ro
    command: >
      sh -c "while true; do
        echo '[reconcile] tick';
        npx tsx scripts/worker-reconcile.ts || true;
        sleep 60;
      done"
    restart: unless-stopped

  research:
    image: polymarket-agents:latest
    container_name: polymarket-agents-research
    depends_on:
      - app
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    volumes:
      - polymarket-data:/app/data
      - ./coinbase_cloud_api_key.json:/app/coinbase_cloud_api_key.json:ro
    command: >
      sh -c "while true; do
        echo '[research] tick';
        npx tsx scripts/research-loop.ts || true;
        sleep 300;
      done"
    restart: unless-stopped

  realtime:
    # Long-running Polymarket WebSocket subscriber. Pairs with the
    # scribe-sports strategy's `requires_websocket: true` flag.
    # Enable by setting REALTIME_EVENT_SLUGS or REALTIME_MARKET_SLUGS
    # (firehose mode if neither is set). Optionally REALTIME_USER_CHANNEL=1
    # to subscribe to the authenticated clob_user channel (needs CLOB creds).
    image: polymarket-agents:latest
    container_name: polymarket-agents-realtime
    depends_on:
      - app
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    volumes:
      - polymarket-data:/app/data
      - ./coinbase_cloud_api_key.json:/app/coinbase_cloud_api_key.json:ro
    command: ["npx", "tsx", "scripts/worker-realtime.ts"]
    restart: unless-stopped

volumes:
  polymarket-data:
  hft-pgdata:
